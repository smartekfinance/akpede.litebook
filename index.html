<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Akpede Finance</title>

    <meta name="description" content="Akpede Finance Web Application">
    <meta name="theme-color" content="#0f172a">

    <link rel="icon" type="image/jpeg" href="liteapp.png">

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #f5f7fa;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        .topbar {
            width: 100%;
            background: #ffffff;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 20px;
            border-bottom: 1px solid #e5e7eb;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
        }

        .logo {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            object-fit: cover;
        }

        .brand-text h1 {
            margin: 0;
            font-size: 18px;
            color: #111827;
        }

        .brand-text p {
            margin: 2px 0 0;
            font-size: 13px;
            color: #6b7280;
        }

        .app-container {
            position: fixed;
            top: 75px;
            left: 0;
            width: 100%;
            height: calc(100% - 75px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .footer-note {
            position: fixed;
            bottom: 10px;
            left: 15px;
            font-size: 12px;
            color: #6b7280;
            z-index: 999;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 10px;
            border-radius: 8px;
        }

        .whatsapp-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
            z-index: 9999;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .whatsapp-button:hover {
            transform: scale(1.08);
        }

        .whatsapp-icon {
            width: 32px;
            height: 32px;
            fill: white;
        }

        @media (max-width: 768px) {
            .topbar {
                padding: 10px 15px;
            }

            .brand-text h1 {
                font-size: 16px;
            }

            .brand-text p {
                font-size: 12px;
            }

            .app-container {
                top: 70px;
                height: calc(100% - 70px);
            }
        }
    </style>
</head>

<body>

    <!-- Top Navigation -->
    <div class="topbar">

        <img src="smartechlogo.jpeg" alt="Akpede Finance Logo" class="logo">

        <div class="brand-text">
            <h1>Akpede Finance</h1>
            <p>Secure Financial Services Platform</p>
        </div>

    </div>

    <!-- Embedded App -->
    <div class="app-container">

        <iframe
            src="https://script.google.com/macros/s/AKfycbyP3nTuQ00VLtQINfqMPmvY0Dy_epS2bgB5oAfHrAunuthEOhlvY_5EuNkl6Y9UISAf/exec">
        </iframe>

    </div>

    <!-- Footer Trust Note -->
    <div class="footer-note">
        Secured
    </div>

    <!-- WhatsApp Button -->
    <a class="whatsapp-button"
        href="https://wa.me/2349039195678?text=Hello%20I%20need%20help"
        target="_blank"
        rel="noopener noreferrer"
        title="Chat on WhatsApp">

        <svg class="whatsapp-icon" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347" />
        </svg>

    </a>

</body>

</html>
